<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rustika Consultant - Absensi</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <!-- HTML5 QR Code -->
    <script src="https://unpkg.com/html5-qrcode"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #f8fafc;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        .bg-polka {
            background-image: radial-gradient(#cbd5e1 1.2px, transparent 1.2px);
            background-size: 24px 24px;
        }

        .app-container {
            width: 100%;
            max-width: 480px;
            margin: 0 auto;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* Hack untuk menyembunyikan UI bawaan HTML5-QRCode */
        #reader__dashboard, #reader__header, #reader__status_span, #reader__dashboard_section_csr {
            display: none !important;
        }
        #reader {
            border: none !important;
            background: transparent;
        }
        #reader video {
            object-fit: cover !important;
            width: 100% !important;
            height: 100% !important;
            border-radius: 2.5rem;
        }

        /* Kesan Cermin Kamera Depan */
        #selfie-video {
            transform: scaleX(-1);
            object-fit: cover;
            width: 100%;
            height: 100%;
            border-radius: 2.5rem;
            background-color: #000;
        }

        /* Bingkai Imbas Tersuai */
        .qr-frame {
            position: absolute;
            inset: 2rem;
            pointer-events: none;
            z-index: 10;
        }
        .qr-frame::before, .qr-frame::after, .qr-frame-inner::before, .qr-frame-inner::after {
            content: '';
            position: absolute;
            width: 50px;
            height: 50px;
            border-color: white;
            border-style: solid;
        }
        .qr-frame::before { top: 0; left: 0; border-width: 5px 0 0 5px; border-top-left-radius: 16px; }
        .qr-frame::after { top: 0; right: 0; border-width: 5px 5px 0 0; border-top-right-radius: 16px; }
        .qr-frame-inner { width: 100%; height: 100%; position: absolute; top: 0; left: 0; }
        .qr-frame-inner::before { bottom: 0; left: 0; border-width: 0 0 5px 5px; border-bottom-left-radius: 16px; }
        .qr-frame-inner::after { bottom: 0; right: 0; border-width: 0 5px 5px 0; border-bottom-right-radius: 16px; }

        .fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="app-container">

        <!-- ========================================== -->
        <!-- PAPARAN 1: PENGIMBAS QR (SCANNER LANGSUNG) -->
        <!-- ========================================== -->
        <div id="scanner-view" class="min-h-screen flex flex-col bg-white fade-in bg-polka">
            <div class="px-6 pt-6 pb-4 flex items-center justify-between bg-white z-50 shadow-sm border-b border-slate-100">
                <div class="w-12 h-12"></div>
                <div class="flex flex-col items-center">
                    <h3 class="font-black text-slate-800 text-lg">Scan ID Card</h3>
                    <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Arahkan ke Kamera</p>
                </div>
                <div class="w-12 h-12 flex items-center justify-center">
                    <img src="https://rustikaconsultant.com/wp-content/uploads/2026/03/logo-rustika.png" alt="Logo" class="w-8 opacity-20">
                </div>
            </div>

            <!-- Kamera Area -->
            <div class="mx-4 my-4 flex-grow relative bg-slate-900 rounded-[2rem] shadow-inner overflow-hidden flex items-center justify-center border-[6px] border-slate-100">
                <div id="reader" class="absolute inset-0"></div>
                <div class="qr-frame"><div class="qr-frame-inner"></div></div>
                
                <!-- Loading Overlay Camera -->
                <div id="camera-loading" class="absolute inset-0 bg-slate-900 flex flex-col items-center justify-center z-20">
                    <svg class="w-8 h-8 text-blue-500 animate-spin mb-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                    <span class="text-white text-xs font-bold tracking-widest uppercase">Menyiapkan Kamera...</span>
                </div>
            </div>

            <!-- Bottom Panel Sesuai Referensi Gambar -->
            <div class="bg-white rounded-t-[2rem] shadow-[0_-10px_30px_rgba(0,0,0,0.08)] w-full flex flex-col border-t border-slate-100 overflow-hidden">
                <div class="p-6 pb-5">
                    <h4 class="font-bold text-slate-800 text-sm mb-1">Scan ID Card atau Gunakan ID</h4>
                    <p class="text-[11px] text-slate-500 mb-4">Direkomendasikan melalui scan ID Card</p>
                    <div class="flex gap-2">
                        <input type="text" id="manual-id-input" placeholder="Masukkan ID Manual" class="flex-grow px-4 py-3 rounded-xl border border-slate-200 text-sm focus:outline-none focus:border-[#0052cc] focus:ring-1 focus:ring-[#0052cc] bg-slate-50 font-medium uppercase">
                        <button onclick="submitManualId()" class="bg-[#0052cc] hover:bg-[#003366] text-white font-bold px-6 py-3 rounded-xl shadow-md active:scale-95 transition-all text-sm">
                            Submit
                        </button>
                    </div>
                </div>
                
                <!-- Indikator In / Out (Otomatis) -->
                <div class="bg-[#0052cc] w-full py-4 px-10 flex justify-center gap-16 items-center">
                    <div class="flex items-center gap-3">
                        <div id="radio-in" class="w-5 h-5 rounded-full border-2 border-white flex items-center justify-center transition-all duration-300"></div>
                        <span class="text-white font-semibold text-sm tracking-wide">In</span>
                    </div>
                    <div class="flex items-center gap-3">
                        <div id="radio-out" class="w-5 h-5 rounded-full border-2 border-white flex items-center justify-center transition-all duration-300"></div>
                        <span class="text-white font-semibold text-sm tracking-wide">Out</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- ========================================== -->
        <!-- PAPARAN 2: KAMERA SWAFOTO (SELFIE) -->
        <!-- ========================================== -->
        <div id="selfie-view" class="hidden min-h-screen flex flex-col bg-white fade-in bg-polka">
            <div class="px-6 pt-6 pb-4 flex items-center justify-between bg-white z-50 shadow-sm border-b border-slate-100">
                <button onclick="resetToScanner()" class="w-12 h-12 flex items-center justify-center bg-slate-50 border border-slate-100 rounded-2xl shadow-sm active:scale-90">
                    <svg class="w-6 h-6 text-slate-700" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                </button>
                <div class="flex flex-col items-center">
                    <h3 class="font-black text-slate-800 text-lg">Verifikasi Wajah</h3>
                    <p class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">Karyawan: <span id="display-scanned-id" class="text-[#0052cc]">...</span></p>
                </div>
                <div class="w-12 h-12"></div>
            </div>

            <div class="mx-6 my-4 flex-grow relative bg-slate-900 rounded-[2.5rem] shadow-[0_10px_40px_rgba(0,0,0,0.2)] overflow-hidden">
                <video id="selfie-video" autoplay playsinline></video>
                <div class="absolute inset-8 border-[4px] border-white/50 border-dashed rounded-[3rem] pointer-events-none"></div>

                <div id="loadingOverlay" class="absolute inset-0 bg-black/60 backdrop-blur-md flex flex-col items-center justify-center hidden z-50">
                    <div class="w-12 h-12 border-4 border-white/20 border-t-white rounded-full animate-spin mb-4"></div>
                    <p class="text-white font-bold tracking-[0.2em] text-xs animate-pulse uppercase">Mengirim Data...</p>
                </div>
            </div>

            <div class="p-6 bg-transparent grid grid-cols-2 gap-4">
                <button onclick="resetToScanner()" class="w-full bg-white border-2 border-slate-200 text-slate-600 font-bold py-4 rounded-[1.5rem] shadow-sm active:scale-95 transition-transform hover:bg-slate-50">
                    Batal
                </button>
                <button onclick="takeSelfieAndSubmit()" class="w-full bg-[#10b981] text-white font-bold py-4 rounded-[1.5rem] shadow-[0_10px_20px_-5px_rgba(16,185,129,0.4)] flex items-center justify-center gap-2 active:scale-95 transition-transform">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                    Konfirmasi
                </button>
            </div>
        </div>

        <!-- ========================================== -->
        <!-- PAPARAN 3: BERJAYA (SUCCESS) -->
        <!-- ========================================== -->
        <div id="success-view" class="hidden min-h-screen flex flex-col bg-white fade-in relative bg-polka">
            <div class="px-6 pt-8 pb-4 flex items-center justify-between bg-transparent">
                <div class="flex items-center gap-3">
                    <img src="https://rustikaconsultant.com/wp-content/uploads/2026/03/logo-rustika.png" alt="Logo" class="h-6 w-auto">
                    <span class="text-sm font-bold text-slate-800">Rustika Consultant</span>
                </div>
                <div class="bg-white px-3 py-1 rounded-full text-[10px] font-bold text-slate-500 shadow-sm border border-slate-100" id="clock-success">00:00</div>
            </div>

            <div class="flex-grow flex flex-col items-center justify-center p-8 text-center -mt-10">
                <div class="w-28 h-28 bg-emerald-100 rounded-full flex items-center justify-center mb-6">
                    <div class="w-20 h-20 bg-emerald-500 rounded-full flex items-center justify-center text-white shadow-lg shadow-emerald-200">
                        <svg class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>
                    </div>
                </div>
                <h2 class="text-3xl font-black text-slate-800 mb-3 tracking-tight">Berhasil!</h2>
                <p id="success-message-text" class="text-slate-500 font-medium">Absensi Berhasil! Hati-hati di jalan.</p>
            </div>

            <div class="p-6 w-full max-w-sm mx-auto mb-4">
                <button onclick="resetToScanner()" class="w-full bg-[#0052cc] text-white font-bold py-4 rounded-[1.5rem] shadow-xl active:scale-95 transition-transform text-lg hover:bg-[#003366]">
                    Kembali Ke Awal
                </button>
            </div>
        </div>

        <!-- Kanvas Tersembunyi -->
        <canvas id="canvas" style="display:none;"></canvas>
    </div>

    <script>
        const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbw2N0zyGqj_cnis1PT1yRRC8-5fz623Op6v5hoBwtxXgBTnpdOMClbiY6LhZeX1AxpofA/exec';
        const API_KEY = "AIzaSyCXDTjmzqVxRaS2FAfp_2jpakA7S1330Js";
        
        let html5QrCode = null;
        let isProcessing = false;
        let scannedId = "";
        let selfieStream = null;

        // --- UPDATE STATUS IN/OUT (OTOMATIS BERDASARKAN WAKTU) ---
        function updateInOutStatus() {
            const now = new Date();
            const timeString = now.toLocaleString('en-US', { timeZone: 'Asia/Makassar', hour12: false, hour: '2-digit' });
            const hour = parseInt(timeString, 10);

            const radioIn = document.getElementById('radio-in');
            const radioOut = document.getElementById('radio-out');

            if (radioIn && radioOut) {
                if (hour < 15) { // Absen Masuk (Di bawah jam 15:00)
                    radioIn.className = "w-5 h-5 rounded-full bg-white flex items-center justify-center transition-all duration-300 shadow-[0_0_8px_rgba(255,255,255,0.6)]";
                    radioOut.className = "w-5 h-5 rounded-full border-2 border-white/40 flex items-center justify-center transition-all duration-300";
                } else { // Absen Pulang (Jam 15:00 ke atas)
                    radioIn.className = "w-5 h-5 rounded-full border-2 border-white/40 flex items-center justify-center transition-all duration-300";
                    radioOut.className = "w-5 h-5 rounded-full bg-white flex items-center justify-center transition-all duration-300 shadow-[0_0_8px_rgba(255,255,255,0.6)]";
                }
            }
        }

        // --- UPDATE WAKTU UI ---
        function updateTime() {
            const now = new Date();
            const timeStr = now.toLocaleTimeString('en-US', { timeZone: 'Asia/Makassar', hour12: false, hour: '2-digit', minute: '2-digit' });
            if(document.getElementById('clock-success')) document.getElementById('clock-success').textContent = timeStr;
            updateInOutStatus(); // Perbarui indikator In/Out setiap detik
        }
        setInterval(updateTime, 1000);

        function showView(viewId) {
            ['scanner-view', 'selfie-view', 'success-view'].forEach(id => {
                document.getElementById(id).classList.add('hidden');
            });
            document.getElementById(viewId).classList.remove('hidden');
        }

        // --- KEMBALI / RESET KE SCANNER UTAMA ---
        async function resetToScanner() {
            if (html5QrCode && html5QrCode.isScanning) { 
                await html5QrCode.stop(); 
                html5QrCode.clear(); 
            }
            if (selfieStream) { 
                selfieStream.getTracks().forEach(track => track.stop()); 
                selfieStream = null; 
            }
            isProcessing = false;
            document.getElementById('manual-id-input').value = ""; // Kosongkan input manual
            openScanner(); // Nyalakan ulang kamera scan
        }

        // --- LANGKAH 1: BUKA KAMERA BELAKANG UNTUK SCAN QR ---
        async function openScanner() {
            showView('scanner-view');
            document.getElementById('camera-loading').classList.remove('hidden');

            if (!html5QrCode) {
                html5QrCode = new Html5Qrcode("reader");
            }
            
            const config = { fps: 15, qrbox: { width: 250, height: 250 } };
            
            try {
                if (html5QrCode.isScanning) {
                    await html5QrCode.stop();
                }
                await html5QrCode.start({ facingMode: "environment" }, config, onScanSuccess);
                document.getElementById('camera-loading').classList.add('hidden');
            } catch (err) {
                document.getElementById('camera-loading').classList.add('hidden');
                Swal.fire({
                    icon: 'warning',
                    title: 'Izin Kamera Dibutuhkan',
                    text: 'Sistem membutuhkan akses kamera untuk scan QR. Pastikan Anda telah memberikan izin pada browser Anda.',
                    confirmButtonText: 'Coba Lagi'
                }).then(() => {
                    // Bisa ditambahkan fungsi reload jika diperlukan
                });
            }
        }

        function onScanSuccess(decodedText) {
            scannedId = decodedText.trim();
            document.getElementById('display-scanned-id').textContent = scannedId;
            startSelfieCamera();
        }

        // --- SUBMIT ID MANUAL (PENGGANTI SCAN) ---
        function submitManualId() {
            const inputId = document.getElementById('manual-id-input').value.trim().toUpperCase();
            if(!inputId) {
                Swal.fire({
                    icon: 'warning',
                    title: 'Perhatian',
                    text: 'Harap masukkan ID Karyawan terlebih dahulu!',
                    confirmButtonColor: '#0052cc'
                });
                return;
            }
            scannedId = inputId;
            document.getElementById('display-scanned-id').textContent = scannedId;
            document.getElementById('manual-id-input').value = "";
            startSelfieCamera();
        }

        // --- LANGKAH 2: BUKA KAMERA DEPAN (SELFIE) ---
        async function startSelfieCamera() {
            showView('selfie-view');

            try {
                if (html5QrCode && html5QrCode.isScanning) { 
                    await html5QrCode.stop(); 
                    html5QrCode.clear();
                }
            } catch(e) {
                console.log("Ralat menghentikan QR:", e);
            }

            // Jeda 0.5 detik agar OS melepas kunci kamera belakang
            setTimeout(async () => {
                try {
                    selfieStream = await navigator.mediaDevices.getUserMedia({ 
                        video: { facingMode: "user" }, 
                        audio: false 
                    });
                    const videoElement = document.getElementById('selfie-video');
                    videoElement.srcObject = selfieStream;
                    videoElement.play();
                } catch (err) {
                    console.error("Ralat Kamera Depan:", err);
                    Swal.fire('Gagal', 'Kamera depan tidak dapat diakses.', 'error');
                    resetToScanner();
                }
            }, 500); 
        }

        // --- LANGKAH 3: AMBIL FOTO & HANTAR DATA ---
        async function takeSelfieAndSubmit() {
            if (isProcessing) return;
            isProcessing = true;
            
            document.getElementById('loadingOverlay').classList.remove('hidden');

            const video = document.getElementById('selfie-video');
            const canvas = document.getElementById('canvas');
            
            // --- FITUR KOMPRESI EKSTRIM (BIAR SATSET ~1 DETIK) ---
            const MAX_WIDTH = 480; // Diperkecil jadi 480px saja (sangat ringan)
            const scaleSize = MAX_WIDTH / video.videoWidth;
            canvas.width = MAX_WIDTH;
            canvas.height = video.videoHeight * scaleSize;
            
            const ctx = canvas.getContext('2d');
            
            // Mirror image sebelum digambar di canvas
            ctx.translate(canvas.width, 0); 
            ctx.scale(-1, 1); 
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            
            // Kompres kualitas menjadi 0.4 (ukuran file akan turun drastis ke < 40KB)
            const photoData = canvas.toDataURL('image/jpeg', 0.4);
            
            const payload = { apiKey: API_KEY, id: scannedId, photo: photoData };

            try {
                const response = await fetch(GOOGLE_SCRIPT_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify(payload)
                });

                const result = await response.json();
                document.getElementById('loadingOverlay').classList.add('hidden');

                if (result.status === "success") {
                    if (selfieStream) { selfieStream.getTracks().forEach(track => track.stop()); }
                    document.getElementById('success-message-text').textContent = result.message;
                    showView('success-view');
                } else {
                    Swal.fire('Peringatan', result.message, 'warning');
                    isProcessing = false;
                }
            } catch (error) {
                document.getElementById('loadingOverlay').classList.add('hidden');
                Swal.fire('Koneksi Error', 'Pastikan internet lancar.', 'error');
                isProcessing = false;
            }
        }

        // INIT: Mulai jam & Nyalakan scanner secara otomatis saat web dimuat
        window.onload = () => {
            updateTime();
            openScanner();
        };

    </script>
</body>
</html>
